<div class="space-y-12">
    <div class="flex flex-col space-y-3">
        <h2>{{ 'settings.account.personalInfo.title' | translate }}</h2>
        <div class="flex flex-row items-center justify-start space-x-1">
            <p>Home</p>
            <mat-icon aria-label="icon" fontIcon="chevron_right"></mat-icon>
            <a routerLink="/settings">{{ 'settings.title' | translate }}</a>
            <mat-icon aria-label="icon" fontIcon="chevron_right"></mat-icon>
            <p>{{ 'settings.account.title' | translate }}</p>
            <mat-icon aria-label="icon" fontIcon="chevron_right"></mat-icon>
            <p>{{ 'settings.account.personalInfo.title' | translate }}</p>
        </div>
    </div>
    <div class="flex flex-col space-y-3">
        <h4>{{ 'settings.account.personalInfo.form.generalities.title' | translate }}</h4>
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col bg-box-background space-y-7 p-6 w-full box-rounded">
            <div class="flex flex-row gap-7">
                <field-input
                    id="name"
                    [label]="i18n.t('settings.account.personalInfo.form.generalities.name')"
                    [type]="FieldType.TEXT"
                    [control]="form.get('name')!"
                    class="w-full"
                ></field-input>
                <field-input
                    id="surname"
                    [label]="i18n.t('settings.account.personalInfo.form.generalities.surname')"
                    [type]="FieldType.TEXT"
                    [control]="form.get('surname')!"
                    class="w-full"
                ></field-input>
            </div>
            <div class="flex flex-row gap-7">
                <field-input
                    id="email"
                    [label]="i18n.t('settings.account.personalInfo.form.generalities.email.label')"
                    [subtitle]="i18n.t('settings.account.personalInfo.form.generalities.email.subTitle')"
                    [type]="FieldType.EMAIL"
                    [control]="form.get('email')!"
                    class="w-full"
                ></field-input>
            </div>
            <div class="flex flex-col items-end w-full">
                <go-button message="Save" class="w-fit" [disabled]="form.invalid" />
            </div>
        </form>
    </div>
</div>
