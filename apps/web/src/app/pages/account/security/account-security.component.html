<div class="space-y-12">
    <div class="flex flex-col space-y-3">
        <h2>{{ 'settings.account.security.title' | translate }}</h2>
        <div class="flex flex-row items-center space-x-1">
            <p>Home</p>
            <mat-icon aria-label="icon" fontIcon="chevron_right"></mat-icon>
            <a routerLink="/settings">{{ 'settings.title' | translate }}</a>
            <mat-icon aria-label="icon" fontIcon="chevron_right"></mat-icon>
            <p>{{ 'settings.account.title' | translate }}</p>
            <mat-icon aria-label="icon" fontIcon="chevron_right"></mat-icon>
            <p>{{ 'settings.account.security.title' | translate }}</p>
        </div>
    </div>
    <div class="flex flex-col space-y-3">
        <h4>{{ 'settings.account.security.form.password.title' | translate }}</h4>
        <div class="flex flex-col bg-box-background space-y-7 p-6 w-full box-rounded">
            <div class="flex flex-row gap-7">
                <field-input
                    id="password"
                    [label]="i18n.t('settings.account.security.form.password.password')"
                    [type]="FieldType.PASSWORD"
                    [control]="form.get('password')!"
                    class="w-full"
                ></field-input>
                <field-input
                    id="confirmPassword"
                    [label]="i18n.t('settings.account.security.form.password.confirmPassword')"
                    [type]="FieldType.PASSWORD"
                    [control]="form.get('confirmPassword')!"
                    class="w-full"
                ></field-input>
            </div>
            <p class="sub" [innerHTML]="i18n.t('settings.account.security.form.password.description')"></p>
            <div class="flex flex-col items-end w-full">
                <go-button message="Save" class="w-fit" />
            </div>
        </div>
    </div>
</div>
