<div class="flex flex-col space-y-14 w-[500px]">
    <div class="flex flex-col space-y-3">
        <h3>{{ 'login.title' | translate }}</h3>
        <p class="sub">{{ 'login.subtitle' | translate }}</p>
    </div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" [noValidate]="false" class="flex flex-col space-y-14">
        <div class="flex flex-col space-y-6">
            <field-input
                id="email"
                label="E-mail"
                [type]="FieldType.EMAIL"
                [control]="form.get('email')!"
            ></field-input>

            <field-input
                id="password"
                label="Password"
                [type]="FieldType.PASSWORD"
                [control]="form.get('password')!"
            ></field-input>
        </div>
        <div class="flex flex-col space-y-6">
            <go-button [message]="i18n.t('login.buttons.signIn')" [disabled]="form.invalid"></go-button>
            <div class="flex justify-end w-full">
                <a routerLink="/change-password" class="items-self-end">{{ 'login.buttons.forgotPassword' | translate }}</a>
            </div>
        </div>
    </form>

</div>
