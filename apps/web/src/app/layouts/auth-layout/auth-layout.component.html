<div class="flex h-screen" *ngIf="false">
    <div class="flex items-center w-1/2 h-full p-12">
        <router-outlet></router-outlet>
    </div>
    <div class="flex justify-center items-center h-full w-1/2 bg-brand-color box-rounded-just-left">
        <a routerLink="/">
            <img ngSrc="/logo/white/logo_symbol_white_bold.svg" alt="logo" height="60" width="60" priority/>
        </a>
    </div>
</div>


<div class="flex h-screen justify-center items-center bg-gradient-color" *ngIf="false">

            <img ngSrc="/logo/white/logo_symbol_white_bold.svg" alt="logo" height="60" width="60" priority/>
        </a>
        <router-outlet></router-outlet>
    </div>
</div>

            <div class="flex items-center flex-1">
                <router-outlet></router-outlet>
            </div>
        </div>
    </div>
    <div class="flex justify-center items-center h-full w-1/2 bg-special-pattern box-rounded-just-left">
